services:
  mongo:
    image: mongo:7
    container_name: ai-interview-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: ai-interview-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      JWT_SECRET: docker_dev_secret_change_me
      MONGO_URI: mongodb://mongo:27017/ai_interview_prep
      CLIENT_URL: http://localhost:5173
      CLIENT_URLS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend/ai_interview_prep
    container_name: ai-interview-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
    volumes:
      - ./frontend/ai_interview_prep:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mongo_data:
  backend_node_modules:
  backend_uploads:
  frontend_node_modules:
